<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Modal Popup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  
  <!-- Trigger Buttons for Multiple Modals -->
  <div class="space-x-4">
    <button data-modal="modal1" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Open Modal 1</button>
    <button data-modal="modal2" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">Open Modal 2</button>
    <button data-modal="modal3" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition">Open Dynamic Modal</button>
  </div>
  


  <!-- Modal Template -->
  <div id="modal1" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="modal-content bg-white rounded-lg shadow-lg w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300">
      <button class="close absolute top-2 right-2 text-gray-500 hover:text-gray-800">&times;</button>
      <h2 class="text-xl font-semibold mb-4">Modal 1 Title</h2>
      <p class="mb-4">This is the first Pro modal with ESC key support and smooth animation.</p>
      <div class="flex justify-end gap-2">
        <button class="cancel px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
        <button class="confirm px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Confirm</button>
      </div>
    </div>
  </div>

  <div id="modal2" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="modal-content bg-white rounded-lg shadow-lg w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300">
      <button class="close absolute top-2 right-2 text-gray-500 hover:text-gray-800">&times;</button>
      <h2 class="text-xl font-semibold mb-4">Modal 2 Title</h2>
      <p class="mb-4">This is the second modal. Dynamic content is ready for the next modal.</p>
      <div class="flex justify-end gap-2">
        <button class="cancel px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
        <button class="confirm px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Dynamic Modal -->
  <div id="modal3" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="modal-content bg-white rounded-lg shadow-lg w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300">
      <button class="close absolute top-2 right-2 text-gray-500 hover:text-gray-800">&times;</button>
      <div id="dynamicContent">
        <!-- Dynamic content will be injected here -->
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button class="cancel px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
        <button class="confirm px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">Confirm</button>
      </div>
    </div>
  </div>


    <script src="script.js"></script>
</body>
</html>
