<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Modal Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
tailwind.config = {
  darkMode: 'class'
}
</script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-500 flex flex-col items-center justify-center min-h-screen space-y-6">

  <!-- Light/Dark Mode Toggle -->
  <button id="themeToggle" class="px-4 py-2 bg-yellow-400 dark:bg-gray-700 text-black dark:text-white rounded hover:bg-yellow-500 transition">Toggle Light/Dark</button>

  <!-- Trigger Buttons -->
  <div class="space-x-4">
    <button data-modal="modal1" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Open Modal 1</button>
    <button data-modal="modal2" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">Open Modal 2</button>
    <button data-modal="modal3" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition">Open Dynamic Modal</button>
  </div>

  <!-- Modal Template -->
  <!-- Modal 1 -->
  <div id="modal1" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="modal-content bg-white dark:bg-gray-800 rounded-lg shadow-lg w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300">
      <button class="close absolute top-2 right-2 text-gray-500 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white">&times;</button>
      <h2 class="text-xl font-semibold mb-4 text-black dark:text-white">Modal 1 Title</h2>
      <p class="mb-4 text-gray-700 dark:text-gray-300">This is the first modal with smooth animation and dark mode support.</p>
      <div class="flex justify-end gap-2">
        <button class="cancel px-4 py-2 bg-gray-300 dark:bg-gray-600 rounded hover:bg-gray-400 dark:hover:bg-gray-500">Cancel</button>
        <button class="confirm px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Modal 2 -->
  <div id="modal2" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="modal-content bg-white dark:bg-gray-800 rounded-lg shadow-lg w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300">
      <button class="close absolute top-2 right-2 text-gray-500 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white">&times;</button>
      <h2 class="text-xl font-semibold mb-4 text-black dark:text-white">Modal 2 Title</h2>
      <p class="mb-4 text-gray-700 dark:text-gray-300">This is the second modal. Light/Dark mode is fully functional.</p>
      <div class="flex justify-end gap-2">
        <button class="cancel px-4 py-2 bg-gray-300 dark:bg-gray-600 rounded hover:bg-gray-400 dark:hover:bg-gray-500">Cancel</button>
        <button class="confirm px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Modal 3: Dynamic API Modal -->
  <div id="modal3" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="modal-content bg-white dark:bg-gray-800 rounded-lg shadow-lg w-11/12 max-w-md p-6 relative transform scale-95 transition-transform duration-300">
      <button class="close absolute top-2 right-2 text-gray-500 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white">&times;</button>
      <div id="dynamicContent" class="text-gray-700 dark:text-gray-300">
        <!-- API content will load here -->
        <p>Loading...</p>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button class="cancel px-4 py-2 bg-gray-300 dark:bg-gray-600 rounded hover:bg-gray-400 dark:hover:bg-gray-500">Cancel</button>
        <button class="confirm px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">Confirm</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
